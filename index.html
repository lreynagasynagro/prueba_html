<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webinar - Inscripción</title>
  <style>
    /* Eliminamos desplazamientos innecesarios */
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: black;
      font-family: Arial, sans-serif;
      overflow: hidden; /* Evita el scroll si queremos pantalla completa */
    }

    .contenedor {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* El wrapper se achica exactamente al tamaño renderizado de la imagen,
       sin importar la resolución — así los % del botón siempre apuntan
       al mismo punto de la foto */
    .imagen-wrapper {
      position: relative;
      display: inline-block;
      line-height: 0;
      max-width: 100%;
      max-height: 100vh;
    }

    .imagen-wrapper img {
      max-width: 100%;
      max-height: 100vh;
      display: block;
    }

    .boton {
      position: absolute;
      left: 80%;
      top: 46%;
      transform: translate(-50%, -50%);
      padding: 2.5% 5%;
      background-color: #1a237e;
      color: white;
      font-size: clamp(11px, 2.2%, 18px);
      font-weight: bold;
      text-decoration: none;
      border-radius: 50px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      transition: background-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
      text-align: center;
      white-space: nowrap;
      z-index: 10;
    }

    .boton:hover {
      background-color: #3949ab;
      box-shadow: 0 6px 20px rgba(0,0,0,0.7);
      transform: translate(-50%, -50%) scale(1.05);
    }
  </style>
</head>
<body>

  <div class="contenedor">
    <div class="imagen-wrapper">
      <img src="POP UP.jpeg" alt="Flyer Webinar">
      <a class="boton" href="https://forms.gle/oJLnw6quU6m6goQdA">
        Inscribirse ahora
      </a>
    </div>
  </div>

</body>
</html>
