<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webinar - Inscripción</title>
  <style>
    /* Eliminamos desplazamientos innecesarios */
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: black;
      font-family: Arial, sans-serif;
      overflow: hidden; /* Evita el scroll si queremos pantalla completa */
    }

    .contenedor {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .contenedor img {
      max-width: 100%;
      max-height: 100%;
      /* 'contain' hace que la imagen quepa entera sin deformarse ni cortarse */
      object-fit: contain; 
      display: block;
    }

    .boton {
      position: absolute;
      bottom: 40px; /* Separación del borde inferior */
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 30px;
      background-color: #1a237e;
      color: white;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      border-radius: 50px; /* Bordes más redondeados para un look moderno */
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      transition: all 0.3s ease;
      text-align: center;
      z-index: 10;
    }

    .boton:hover {
      background-color: #3949ab;
      transform: translateX(-50%) scale(1.05);
      box-shadow: 0 6px 20px rgba(0,0,0,0.7);
    }

    /* Ajuste para móviles: botón un poco más pequeño */
    @media (max-width: 600px) {
      .boton {
        width: 80%;
        bottom: 30px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="contenedor">
    <!-- La imagen se adaptará automáticamente al centro -->
    <img src="Webinar Precarga - Flyer.png" alt="Flyer Webinar">
    
    <a class="boton" href="https://docs.google.com/forms/u/1/d/1kolqJxQxTLYLozG2kiKJ8PL70cPlNHSdKrxL1WtfJeY/edit">
      Inscribirse ahora
    </a>
  </div>

</body>
</html>
