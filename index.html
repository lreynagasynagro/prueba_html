<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webinar - Inscripción</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: black;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .contenedor {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .imagen-wrapper {
      position: relative;
      line-height: 0;
    }

    .imagen-wrapper img {
      height: 100vh;
      width: auto;
      max-width: 100vw;
      display: block;
    }

    .boton {
      position: absolute;

      /* POSICIÓN DEL BOTÓN */
      left: 50%;
      top: calc(94% + 10px);

      transform: translate(-50%, -50%);

      padding: 15px 35px;
      background-color: #1a237e;
      color: white;
      font-size: 20px;
      font-weight: bold;
      text-decoration: none;
      border-radius: 50px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      transition: all 0.3s ease;
      text-align: center;
      white-space: nowrap;
      z-index: 10;
    }

    .boton:hover {
      background-color: #3949ab;
      box-shadow: 0 6px 20px rgba(0,0,0,0.7);
      transform: translate(-50%, -50%) scale(1.05);
    }
  </style>
</head>

<body>

  <div class="contenedor">
    <div class="imagen-wrapper">

      <img
        src="Placa Webinar Cuentas Corrientes de Proveedores - SYNAGRO 7.png"
        alt="Flyer Webinar"
      >

<a
  class="boton"
  href="https://forms.gle/UQmz6VUtQrwQKcjd9"
  target="_blank"
>
  Inscribirse
</a>

    </div>
  </div>

</body>
</html>
